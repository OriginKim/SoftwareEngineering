{% extends 'base.html' %}

{% block title %}새 학습 계획 만들기 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h2 class="h4 mb-0">새 학습 계획 만들기</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="title" class="form-label">학습 계획 제목</label>
                            <input type="text" class="form-control" id="title" name="title"
                                   placeholder="예: TOEIC 900점 달성 계획" required>
                            <div class="form-text">나만의 학습 계획 제목을 입력하세요.</div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="target_words_per_day" class="form-label">일일 목표 단어 수</label>
                            <select class="form-select" id="target_words_per_day" name="target_words_per_day" required>
                                <option value="10">10개</option>
                                <option value="20" selected>20개</option>
                                <option value="30">30개</option>
                                <option value="40">40개</option>
                                <option value="50">50개</option>
                            </select>
                            <div class="form-text">하루에 학습할 목표 단어 수를 선택하세요.</div>
                        </div>

                        <div class="alert alert-info" role="alert">
                            <h5 class="alert-heading">학습 계획 팁!</h5>
                            <p class="mb-0">
                                - 꾸준히 할 수 있는 현실적인 목표를 설정하세요.<br>
                                - 처음에는 적은 수의 단어로 시작하는 것이 좋습니다.<br>
                                - 학습 진도에 따라 목표를 조정할 수 있습니다.
                            </p>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                학습 계획 만들기
                            </button>
                            <a href="{% url 'study:plan_list' %}" class="btn btn-outline-secondary">
                                취소
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
