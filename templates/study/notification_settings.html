{% extends 'base.html' %}

{% block title %}알림 설정 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">알림 설정</h2>
    
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <h5 class="card-title">알림 유형</h5>
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="review_notifications" name="review_notifications" {% if settings.review_notifications %}checked{% endif %}>
                        <label class="form-check-label" for="review_notifications">
                            복습 알림
                            <small class="text-muted d-block">복습 일정이 있을 때 알림을 받습니다.</small>
                        </label>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="achievement_notifications" name="achievement_notifications" {% if settings.achievement_notifications %}checked{% endif %}>
                        <label class="form-check-label" for="achievement_notifications">
                            성취 알림
                            <small class="text-muted d-block">학습 목표를 달성했을 때 알림을 받습니다.</small>
                        </label>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="reminder_notifications" name="reminder_notifications" {% if settings.reminder_notifications %}checked{% endif %}>
                        <label class="form-check-label" for="reminder_notifications">
                            학습 독려 알림
                            <small class="text-muted d-block">일정 기간 학습하지 않았을 때 알림을 받습니다.</small>
                        </label>
                    </div>
                </div>
                
                <div class="mb-4">
                    <h5 class="card-title">알림 시간</h5>
                    <div class="form-group">
                        <input type="time" class="form-control" id="notification_time" name="notification_time" value="{{ settings.notification_time|time:'H:i' }}">
                        <small class="text-muted">매일 이 시간에 알림을 받습니다.</small>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">설정 저장</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
