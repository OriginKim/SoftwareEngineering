{% extends 'base.html' %}

{% block title %}학습 관리 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">학습 관리</h2>
    
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">학습 계획</h5>
                    <p class="card-text">학습 목표와 일정을 관리합니다.</p>
                    <a href="{% url 'study:plan_list' %}" class="btn btn-primary">학습 계획 관리</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">학습 진도</h5>
                    <p class="card-text">단어 학습 진행 상황을 확인합니다.</p>
                    <a href="{% url 'study:progress' %}" class="btn btn-primary">진도 확인</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-4 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">복습 일정</h5>
                    <p class="card-text">복습이 필요한 단어를 확인합니다.</p>
                    <a href="{% url 'study:review' %}" class="btn btn-primary">복습 관리</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">학습 통계</h5>
                    <p class="card-text">학습 현황과 성과를 분석합니다.</p>
                    <a href="{% url 'study:statistics' %}" class="btn btn-primary">통계 보기</a>
                </div>
            </div>
        </div>
        
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">알림</h5>
                    <p class="card-text">학습 관련 알림을 확인합니다.</p>
                    <a href="{% url 'study:notification_list' %}" class="btn btn-primary">알림 확인</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
