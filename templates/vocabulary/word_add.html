{% extends 'base.html' %}

{% block title %}단어 추가 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">단어 추가</h2>
    
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="english" class="form-label">영단어</label>
                            <input type="text" class="form-control" id="english" name="english" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="korean" class="form-label">한글 뜻</label>
                            <input type="text" class="form-control" id="korean" name="korean" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="part_of_speech" class="form-label">품사</label>
                            <select class="form-select" id="part_of_speech" name="part_of_speech" required>
                                <option value="noun">명사</option>
                                <option value="verb">동사</option>
                                <option value="adjective">형용사</option>
                                <option value="adverb">부사</option>
                                <option value="preposition">전치사</option>
                                <option value="conjunction">접속사</option>
                                <option value="interjection">감탄사</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="difficulty" class="form-label">난이도</label>
                            <select class="form-select" id="difficulty" name="difficulty" required>
                                <option value="easy">쉬움</option>
                                <option value="medium" selected>보통</option>
                                <option value="hard">어려움</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="example_sentence" class="form-label">예문</label>
                            <textarea class="form-control" id="example_sentence" name="example_sentence" rows="2"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="example_translation" class="form-label">예문 번역</label>
                            <textarea class="form-control" id="example_translation" name="example_translation" rows="2"></textarea>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">단어 추가</button>
                            <a href="{% url 'vocabulary:word_list' %}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
