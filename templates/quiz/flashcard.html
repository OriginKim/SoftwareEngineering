{% extends 'base.html' %}

{% block title %}플래시카드 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">플래시카드</h2>
    
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card mb-4">
                <div class="card-body">
                    <div id="flashcardContainer" class="text-center">
                        <div class="flashcard" onclick="flipCard()" style="cursor: pointer; min-height: 200px;">
                            <div id="cardFront" class="mb-3">
                                <h3 class="display-4" id="wordText"></h3>
                            </div>
                            <div id="cardBack" style="display: none;">
                                <h4 class="mb-3" id="meaningText"></h4>
                                <p class="text-muted" id="exampleText"></p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <button class="btn btn-secondary" onclick="prevCard()">이전</button>
                        <div>
                            <span id="progress">0/0</span>
                        </div>
                        <button class="btn btn-primary" onclick="nextCard()">다음</button>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <div class="btn-group">
                    <button class="btn btn-success" onclick="markKnown()">알고 있음</button>
                    <button class="btn btn-danger" onclick="markUnknown()">모름</button>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="{% url 'quiz:quiz_home' %}" class="btn btn-outline-secondary">학습 종료</a>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="completionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">학습 완료!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>총 단어: <span id="totalWords">0</span>개</p>
                <p>아는 단어: <span id="knownWords">0</span>개</p>
                <p>모르는 단어: <span id="unknownWords">0</span>개</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                <a href="{% url 'quiz:flashcard' %}" class="btn btn-primary">다시 시작</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    let words = [];
    let currentIndex = 0;
    let isFlipped = false;
    let knownCount = 0;
    let unknownCount = 0;
    
    // 단어 데이터 로드
    fetch('/quiz/api/get-flashcard-words/')
        .then(response => response.json())
        .then(data => {
            words = data;
            updateCard();
            updateProgress();
        });
    
    window.flipCard = function() {
        isFlipped = !isFlipped;
        const front = document.getElementById('cardFront');
        const back = document.getElementById('cardBack');
        
        if (isFlipped) {
            front.style.display = 'none';
            back.style.display = 'block';
        } else {
            front.style.display = 'block';
            back.style.display = 'none';
        }
    };
    
    window.prevCard = function() {
        if (currentIndex > 0) {
            currentIndex--;
            isFlipped = false;
            updateCard();
            updateProgress();
        }
    };
    
    window.nextCard = function() {
        if (currentIndex < words.length - 1) {
            currentIndex++;
            isFlipped = false;
            updateCard();
            updateProgress();
        }
    };
    
    window.markKnown = function() {
        if (currentIndex < words.length) {
            knownCount++;
            recordProgress(true);
            nextCard();
        }
    };
    
    window.markUnknown = function() {
        if (currentIndex < words.length) {
            unknownCount++;
            recordProgress(false);
            nextCard();
        }
    };
    
    function updateCard() {
        if (words.length === 0) return;
        
        const word = words[currentIndex];
        document.getElementById('wordText').textContent = word.english;
        document.getElementById('meaningText').textContent = word.korean;
        document.getElementById('exampleText').textContent = word.example || '';
        
        document.getElementById('cardFront').style.display = 'block';
        document.getElementById('cardBack').style.display = 'none';
    }
    
    function updateProgress() {
        document.getElementById('progress').textContent = 
            `${currentIndex + 1}/${words.length}`;
    }
    
    function recordProgress(isKnown) {
        fetch('/quiz/api/record-flashcard-progress/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                word_id: words[currentIndex].id,
                is_known: isKnown
            })
        });
        
        if (currentIndex === words.length - 1) {
            showCompletionModal();
        }
    }
    
    function showCompletionModal() {
        document.getElementById('totalWords').textContent = words.length;
        document.getElementById('knownWords').textContent = knownCount;
        document.getElementById('unknownWords').textContent = unknownCount;
        
        new bootstrap.Modal(document.getElementById('completionModal')).show();
    }
});
</script>
{% endblock %}
