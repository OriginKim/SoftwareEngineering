{% extends 'base.html' %}

{% block title %}새 퀴즈 만들기 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h2 class="h4 mb-0">새 퀴즈 만들기</h2>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="title" class="form-label">퀴즈 제목</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">설명</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="quiz_type" class="form-label">퀴즈 유형</label>
                            <select class="form-select" id="quiz_type" name="quiz_type" required>
                                {% for type_code, type_name in quiz_types %}
                                <option value="{{ type_code }}">{{ type_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="difficulty" class="form-label">난이도</label>
                            <select class="form-select" id="difficulty" name="difficulty" required>
                                {% for diff_code, diff_name in difficulties %}
                                <option value="{{ diff_code }}">{{ diff_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="word_count" class="form-label">문제 수</label>
                            <input type="number" class="form-control" id="word_count" name="word_count" 
                                   min="5" max="50" value="10" required>
                            <div class="form-text">5~50개 사이의 문제를 생성할 수 있습니다.</div>
                        </div>

                        <div class="mb-3">
                            <label for="time_limit" class="form-label">제한 시간 (분)</label>
                            <input type="number" class="form-control" id="time_limit" name="time_limit" 
                                   min="0" max="60" value="0">
                            <div class="form-text">0을 입력하면 시간 제한이 없습니다.</div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_public" name="is_public" checked>
                                <label class="form-check-label" for="is_public">
                                    공개 퀴즈로 설정
                                </label>
                                <div class="form-text">다른 사용자들도 이 퀴즈를 볼 수 있습니다.</div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">퀴즈 생성</button>
                            <a href="{% url 'quiz:quiz_list' %}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
