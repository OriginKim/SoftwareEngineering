{% extends 'base.html' %}

{% block title %}타이머 퀴즈 - TOEIC 단어 학습{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">타이머 퀴즈</h2>
    
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h3 id="timer" class="display-4">05:00</h3>
                    </div>
                    
                    <div id="quizContainer">
                        <div class="text-center mb-4">
                            <button id="startBtn" class="btn btn-primary btn-lg">시작하기</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <a href="{% url 'quiz:quiz_home' %}" class="btn btn-outline-secondary">퀴즈 종료</a>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">퀴즈 결과</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>맞은 문제: <span id="correctCount">0</span></p>
                <p>총 문제: <span id="totalCount">0</span></p>
                <p>정답률: <span id="accuracy">0</span>%</p>
                <div id="resultDetails"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                <a href="{% url 'quiz:timer_quiz' %}" class="btn btn-primary">다시 시작</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const QUIZ_TIME = 5 * 60; // 5분
    let timeLeft = QUIZ_TIME;
    let timer;
    let questions = [];
    let currentQuestion = 0;
    let answers = [];
    let isQuizActive = false;
    
    document.getElementById('startBtn').addEventListener('click', startQuiz);
    
    function startQuiz() {
        fetch('/quiz/api/get-timer-words/')
            .then(response => response.json())
            .then(data => {
                questions = data;
                isQuizActive = true;
                showQuestion();
                startTimer();
                document.getElementById('startBtn').style.display = 'none';
            });
    }
    
    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            
            if (timeLeft <= 0) {
                endQuiz();
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer').textContent = 
            `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    
    function showQuestion() {
        if (!isQuizActive) return;
        
        const question = questions[currentQuestion];
        const container = document.getElementById('quizContainer');
        
        container.innerHTML = `
            <div class="mb-4">
                <h4>${question.english}</h4>
                <div class="mb-3">
                    <input type="text" class="form-control" id="answer" placeholder="한글 뜻을 입력하세요" autocomplete="off">
                </div>
                <button class="btn btn-primary" onclick="submitAnswer()">제출</button>
            </div>
        `;
        
        // Enter 키로 제출
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitAnswer();
            }
        });
    }
    
    window.submitAnswer = function() {
        const answer = document.getElementById('answer').value.trim();
        if (!answer) return;
        
        answers.push({
            question_id: questions[currentQuestion].id,
            answer: answer,
            time_taken: QUIZ_TIME - timeLeft
        });
        
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            endQuiz();
        }
    };
    
    function endQuiz() {
        clearInterval(timer);
        isQuizActive = false;
        
        // 결과 제출
        fetch('/quiz/api/submit-timer-quiz/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                answers: answers,
                total_time: QUIZ_TIME - timeLeft
            })
        })
        .then(response => response.json())
        .then(showResults);
    }
    
    function showResults(result) {
        document.getElementById('correctCount').textContent = result.correct_count;
        document.getElementById('totalCount').textContent = result.total_count;
        document.getElementById('accuracy').textContent = 
            Math.round((result.correct_count / result.total_count) * 100);
        
        const details = document.getElementById('resultDetails');
        details.innerHTML = result.answers.map((answer, index) => `
            <div class="mb-2">
                <strong>${questions[index].english}</strong><br>
                내 답변: ${answers[index].answer}<br>
                정답: ${questions[index].korean}<br>
                소요 시간: ${answers[index].time_taken}초<br>
                <span class="text-${answer.is_correct ? 'success' : 'danger'}">
                    ${answer.is_correct ? '정답' : '오답'}
                </span>
            </div>
        `).join('');
        
        new bootstrap.Modal(document.getElementById('resultModal')).show();
    }
});
</script>
{% endblock %}
