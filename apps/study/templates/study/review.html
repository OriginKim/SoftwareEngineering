{% block content %}

    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="card mb-4">
                <div class="card-header">
                    <h2 class="h4 mb-0">복습 학습</h2>

                    </div>
                </div>
                <div class="card-footer">
                    <a href="{% url 'study:plan_detail' plan.id %}" class="btn btn-secondary">

            </div>
